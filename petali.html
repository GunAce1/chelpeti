<!DOCTYPE html>
<html>
<head>
<title>Love Question</title>
<style>
body{
    text-align:center;
    font-family:Arial;
    margin-top:100px;
    background:#ffe6f0;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

#image{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Do you love me? ❤️</h1>

<button onclick="yes()">Yes</button>
<button onclick="no()">No</button>

<div id="image">
    <img src="https://i.imgur.com/4M7IWwP.png" width="300">
    <p>Oh no... 💔</p>
</div>

<script>
function yes(){
    alert("I love you too petali ❤️");
}

function no(){
    document.getElementById("image").style.display = "block";
}
</script>

</body>
</html>
